<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>VEX CORE | Mobile Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/socket.io/socket.io.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --bg:#050507;
    --purple:#a855f7;
    --glow:rgba(168,85,247,0.4);
    --card:rgba(20,20,23,0.7);
    --text:#f4f4f5;
    --dim:#a1a1aa;
    --danger:#ff4d4d;
    --success:#22c55e;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins, sans-serif}

body{
    background: radial-gradient(circle at top right,#1a1033,var(--bg));
    color:var(--text);
    max-width:480px;
    margin:auto;
    overflow-x:hidden;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    position:sticky;
    top:0;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.menu{font-size:20px;color:var(--purple);cursor:pointer}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:-260px;
    top:0;
    width:260px;
    height:100%;
    background:#000;
    transition:0.3s;
    padding:20px;
    z-index:2000;
}
.sidebar.active{left:0}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
}
.overlay.active{display:block}

/* CONTENT */
.main{padding:15px}

.card{
    background:var(--card);
    padding:18px;
    border-radius:18px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.05);
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    margin-top:10px;
    font-weight:600;
}

.primary{background:var(--purple)}
.secondary{background:#111;border:1px solid #333}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #333;
    background:#000;
    color:#fff;
    margin-top:10px;
}

/* MODAL */
#portal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:5000;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <h2 style="color:var(--purple)">VEX CORE</h2>
    <br>
    <p onclick="logout()" style="color:red;cursor:pointer">Logout</p>
</div>

<div class="header">
    <div class="menu" onclick="toggleMenu()">☰</div>
    <div>VEX<span style="color:var(--purple)">~</span>HUB</div>
    <div id="avatar">👤</div>
</div>

<div id="portal"></div>

<div class="main">

    <h3 id="welcome">Loading...</h3>

    <div class="card">
        Wallet: <b id="balance">0</b> VX
    </div>

    <div class="card">
        Status: <b id="status" style="color:red">OFFLINE</b>
    </div>

    <div class="card">
        <input id="sid" placeholder="Paste VEX~ Session ID">

        <button class="btn primary" onclick="deploy()">DEPLOY</button>
        <button class="btn secondary" onclick="pair()">PAIR NEW</button>
    </div>

</div>

<script>
const supabase = supabase.createClient(
"https://rxkwkapxzcmpjsegpbpv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4a3drYXB4emNtcGpzZWdwYnB2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzA1MTQyMywiZXhwIjoyMDkyNjI3NDIzfQ.cFAslTZh7j30pCLB2r80k7FpPJ3XeWxadTvbQ4hEkhI"
);

const socket = io();
let user;

/* MENU */
function toggleMenu(){
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");
}

/* INIT */
async function init(){
    const {data:{user:u}} = await supabase.auth.getUser();

    if(!u){
        location.href="index.html";
        return;
    }

    user = u;

    // IMPORTANT: join room for pairing
    socket.emit("join", user.id);

    loadUser();
    listenRealtime();
}

/* LOAD USER */
async function loadUser(){
    const {data} = await supabase
        .from("M_users")
        .select("*")
        .eq("M_user_id", user.id)
        .single();

    if(data){
        welcome.innerText = "Hello, " + (data.M_username || "Operator");
        balance.innerText = data.M_vx_balance;
    }

    const {data:session} = await supabase
        .from("M_sessions")
        .select("*")
        .eq("M_user_id", user.id)
        .single();

    updateStatus(session?.M_pairing_status);
}

/* STATUS */
function updateStatus(s){
    if(s==="connected"){
        status.innerText="ONLINE";
        status.style.color="lime";
    }else{
        status.innerText="OFFLINE";
        status.style.color="red";
    }
}

/* DEPLOY */
async function deploy(){
    const sidVal = sid.value;

    if(!sidVal.startsWith("VEX~")) return alert("Invalid ID");

    await supabase.from("M_sessions").upsert({
        M_user_id:user.id,
        M_session_data:{creds:sidVal},
        M_pairing_status:"connected"
    });

    alert("Deploying...");
}

/* PAIR */
async function pair(){
    await fetch(`/request-pair/${user.id}`);
    portal.style.display="flex";
}

/* SOCKET EVENTS */
socket.on("render_portal", html=>{
    portal.innerHTML = html;
});

socket.on("vex_pairing_complete", ()=>{
    portal.style.display="none";
});

/* REALTIME */
function listenRealtime(){
    supabase.channel("live")
    .on("postgres_changes",{
        event:"*",
        schema:"public",
        table:"M_sessions",
        filter:`M_user_id=eq.${user.id}`
    },p=>{
        updateStatus(p.new.M_pairing_status);
    })
    .on("postgres_changes",{
        event:"*",
        schema:"public",
        table:"M_users",
        filter:`M_user_id=eq.${user.id}`
    },p=>{
        balance.innerText = p.new.M_vx_balance;
    })
    .subscribe();
}

/* LOGOUT */
async function logout(){
    await supabase.auth.signOut();
    location.href="index.html";
}

init();
</script>

</body>
</html>
