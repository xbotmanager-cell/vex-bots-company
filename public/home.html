<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEX CORE | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --card-bg: #141417;
            --accent-glow: #00f2ff;
            --text-main: #e2e2e7;
            --text-dim: #a1a1aa;
            --danger: #ff4d4d;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        /* Dashboard Layout */
        .wrapper { display: flex; min-height: 100vh; }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .nav-brand { padding: 30px; font-size: 1.5rem; font-weight: 800; color: var(--accent-glow); letter-spacing: 2px; }
        .nav-menu { flex: 1; padding: 10px; }
        .nav-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 5px;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1d1d21; color: var(--accent-glow); }
        .nav-item i { margin-right: 15px; width: 20px; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #27272a; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-glow); }
        .stat-label { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #fff; }

        /* Core Action Section */
        .action-panel { background: var(--card-bg); border-radius: 24px; padding: 40px; border: 1px solid #27272a; text-align: center; }
        .instance-status { margin-bottom: 20px; display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 50px; background: #1d1d21; font-size: 0.85rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; background: var(--text-dim); }
        .status-dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .input-group { max-width: 500px; margin: 30px auto; position: relative; }
        input[type="text"] {
            width: 100%;
            background: #0a0a0b;
            border: 1px solid #3f3f46;
            padding: 18px 25px;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent-glow); }

        .btn {
            padding: 15px 35px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary { background: var(--accent-glow); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); }
        .btn-secondary { background: #27272a; color: #fff; margin-top: 15px; }

        /* Pairing Modal */
        #portal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; padding-bottom: 10px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="portal-overlay">
    <div id="portal-container"></div>
</div>

<div class="wrapper">
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="nav-brand">VEX CORE</div>
        <div class="nav-menu">
            <a href="index.html" class="nav-item active"><i class="fa-solid fa-gauge-high"></i> Overview</a>
            <a href="instances.html" class="nav-item"><i class="fa-solid fa-server"></i> Instances</a>
            <a href="billing.html" class="nav-item"><i class="fa-solid fa-wallet"></i> Billing</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-gears"></i> Bot Settings</a>
        </div>
        <div style="padding: 20px;">
            <a href="#" onclick="logout()" class="nav-item" style="color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <!-- Content -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1 id="welcome-text">Loading Grid...</h1>
                <p style="color: var(--text-dim);">System Status: Operational</p>
            </div>
            <div class="btn btn-secondary" onclick="claimDaily()">
                <i class="fa-solid fa-gift"></i> Claim 5 VX
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">VX BALANCE</span>
                <div class="stat-value"><span id="vx-balance">0</span> <small style="font-size: 0.9rem; color: var(--accent-glow);">VX</small></div>
            </div>
            <div class="stat-card">
                <span class="stat-label">BOT STATUS</span>
                <div class="stat-value" id="status-text">OFFLINE</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">UPTIME</span>
                <div class="stat-value" id="uptime-val">00:00:00</div>
            </div>
        </div>

        <section class="action-panel">
            <div class="instance-status">
                <div class="status-dot" id="live-dot"></div>
                <span id="logic-label">VEX~ ENGINE READY</span>
            </div>
            <h2>Deploy Your Instance</h2>
            <p style="color: var(--text-dim); margin-top: 10px;">Enter your VEX~ Session ID below or generate a new one.</p>

            <div class="input-group">
                <input type="text" id="session-id-input" placeholder="VEX~XXXX-XXXX-XXXX">
                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn btn-primary" onclick="deployBot()">
                        <i class="fa-solid fa-rocket"></i> DEPLOY INSTANCE (20 VX)
                    </button>
                    <button class="btn btn-secondary" onclick="requestPairing()">
                        <i class="fa-solid fa-qrcode"></i> GET NEW SESSION ID
                    </button>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    const supabaseUrl = 'YOUR_SUPABASE_URL';
    const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
    const vex = supabase.createClient(supabaseUrl, supabaseKey);
    const socket = io();

    let currentUser = null;

    // 1. AUTH & INITIALIZATION
    async function init() {
        const { data: { user } } = await vex.auth.getUser();
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        
        fetchUserStats();
        subscribeToUpdates();
    }

    // 2. FETCH DATA FROM M_USERS & M_SESSIONS
    async function fetchUserStats() {
        const { data: profile } = await vex.from('M_users').select('*').eq('M_user_id', currentUser.id).single();
        if (profile) {
            document.getElementById('welcome-text').innerText = `Welcome, ${profile.M_username || 'Operator'}`;
            document.getElementById('vx-balance').innerText = profile.M_vx_balance;
        }

        const { data: session } = await vex.from('M_sessions').select('M_pairing_status').eq('M_user_id', currentUser.id).single();
        updateUIStatus(session?.M_pairing_status || 'disconnected');
    }

    // 3. UI LOGIC SYNC
    function updateUIStatus(status) {
        const dot = document.getElementById('live-dot');
        const text = document.getElementById('status-text');
        const label = document.getElementById('logic-label');

        if (status === 'connected') {
            dot.classList.add('active');
            text.innerText = 'ONLINE';
            text.style.color = 'var(--success)';
            label.innerText = 'INSTANCE ACTIVE';
        } else if (status === 'pairing') {
            text.innerText = 'PAIRING...';
            text.style.color = 'var(--accent-glow)';
        } else {
            dot.classList.remove('active');
            text.innerText = 'OFFLINE';
            text.style.color = 'var(--danger)';
            label.innerText = 'VEX~ ENGINE IDLE';
        }
    }

    // 4. REQUEST PAIRING (The Bridge to VexInstance)
    async function requestPairing() {
        const response = await fetch(`/request-pair/${currentUser.id}`);
        if (response.ok) {
            document.getElementById('portal-overlay').style.display = 'flex';
        }
    }

    // Socket listener for the pairing portal template
    socket.on('render_portal', (html) => {
        document.getElementById('portal-container').innerHTML = html;
    });

    socket.on('vex_pairing_complete', () => {
        setTimeout(() => {
            document.getElementById('portal-overlay').style.display = 'none';
            alert("Pairing Successful! Check WhatsApp for your Session ID.");
        }, 2000);
    });

    // 5. DEPLOY BOT LOGIC
    async function deployBot() {
        const sessionId = document.getElementById('session-id-input').value;
        const balance = parseInt(document.getElementById('vx-balance').innerText);

        if (!sessionId.startsWith('VEX~')) {
            alert("Invalid Session ID Format!");
            return;
        }

        if (balance < 20) {
            alert("Insufficient Balance! You need at least 20 VX to deploy.");
            return;
        }

        // Update session in DB - Triggering Manager boot
        const { error } = await vex.from('M_sessions').upsert({
            M_user_id: currentUser.id,
            M_session_data: { creds: sessionId },
            M_pairing_status: 'connected'
        });

        if (!error) alert("Deployment Initiated. Monitoring status...");
    }

    // 6. REALTIME DB LISTENER
    function subscribeToUpdates() {
        vex.channel('any')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'M_sessions', filter: `M_user_id=eq.${currentUser.id}` }, payload => {
                updateUIStatus(payload.new.M_pairing_status);
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'M_users', filter: `M_user_id=eq.${currentUser.id}` }, payload => {
                document.getElementById('vx-balance').innerText = payload.new.M_vx_balance;
            })
            .subscribe();
    }

    // 7. CLAIM REWARD (RPC)
    async function claimDaily() {
        const { error } = await vex.rpc('increment_vx', { user_id: currentUser.id, amount: 5 });
        if (error) alert("You already claimed today!");
        else alert("5 VX Added to your wallet!");
    }

    window.onload = init;
</script>
</body>
</html>
