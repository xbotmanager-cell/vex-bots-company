<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>VEX HOST</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg:#050505;
    --text:#ffffff;
    --glass:rgba(255,255,255,0.05);
    --border:rgba(255,255,255,0.1);
    --main:#a855f7;
}

body.light {
    --bg:#f1f1f1;
    --text:#111;
    --glass:rgba(0,0,0,0.05);
    --border:rgba(0,0,0,0.1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
}

/* MOBILE LOCK */
@media(min-width:600px){
    body::before{
        content:"Open on Mobile";
        position:fixed;
        top:0;left:0;
        width:100%;
        height:100%;
        background:black;
        color:white;
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:9999;
    }
}

.container{
    width:100%;
    max-width:420px;
    padding:20px;
}

.card{
    background:var(--glass);
    border:1px solid var(--border);
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:black;
    color:white;
    border:1px solid var(--border);
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:var(--main);
    color:white;
    font-weight:bold;
}

.toggle{
    text-align:center;
    margin-top:10px;
    font-size:12px;
    opacity:0.7;
}

.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.theme{
    padding:5px 10px;
    border:1px solid var(--border);
    border-radius:10px;
    background:none;
    color:var(--text);
}
</style>
</head>

<body>

<div class="container">

<div class="top">
    <h3>VEX HOST</h3>
    <button class="theme" onclick="toggleTheme()">Theme</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="card">
<h3>Create Account</h3>

<input id="reg-user" placeholder="Username">
<input id="reg-email" placeholder="Email">
<input id="reg-pass" type="password" placeholder="Password">

<button onclick="signup()">Create</button>

<div class="toggle" onclick="showLogin()">Already have account? Login</div>
</div>

<!-- LOGIN -->
<div id="login" class="card" style="display:none;">
<h3>Login</h3>

<input id="log-email" placeholder="Email">
<input id="log-pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="toggle" onclick="showSignup()">Create account</div>
</div>

</div>

<script>
const supabaseClient = supabase.createClient(
    "https://rxkwkapxzcmpjsegpbpv.supabase.co",
    "PUBLIC_ANON_KEY_ONLY" // ⚠️ USIWEKE SERVICE ROLE HAPA
);

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("light");
}

/* NAV */
function showLogin(){
    document.getElementById("signup").style.display="none";
    document.getElementById("login").style.display="block";
}

function showSignup(){
    document.getElementById("signup").style.display="block";
    document.getElementById("login").style.display="none";
}

/* SIGNUP */
async function signup(){
    const email = regEmail();
    const pass = regPass();
    const user = regUser();

    if(!email || !pass || !user) return alert("Fill all");

    const {data,error} = await supabaseClient.auth.signUp({
        email,
        password:pass,
        options:{
            data:{username:user}
        }
    });

    if(error) return alert(error.message);

    localStorage.setItem("vex_user", email);

    alert("Account created");
}

/* LOGIN */
async function login(){
    const email = logEmail();
    const pass = logPass();

    const {data,error} = await supabaseClient.auth.signInWithPassword({
        email,
        password:pass
    });

    if(error) return alert("Wrong login");

    localStorage.setItem("vex_user", email);

    window.location.href="home.html";
}

/* HELPERS */
const regEmail = ()=>document.getElementById("reg-email").value;
const regPass = ()=>document.getElementById("reg-pass").value;
const regUser = ()=>document.getElementById("reg-user").value;

const logEmail = ()=>document.getElementById("log-email").value;
const logPass = ()=>document.getElementById("log-pass").value;

/* AUTO REMEMBER */
window.onload = async ()=>{
    const { data } = await supabaseClient.auth.getSession();

    if(data.session){
        window.location.href="home.html";
    }
};
</script>

</body>
</html>
