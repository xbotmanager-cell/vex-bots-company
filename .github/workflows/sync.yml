name: VEX Universal Sync

on:
  push:
    branches:
      - main

jobs:
  distribute-code:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Master Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to All Clients
        env:
          # Secrets zako (1-10)
          TOKEN_1: ${{ secrets.CLIENT_1_TOKEN }}
          URL_1: ${{ secrets.CLIENT_1_URL }}
          TOKEN_2: ${{ secrets.CLIENT_2_TOKEN }}
          URL_2: ${{ secrets.CLIENT_2_URL }}
          TOKEN_3: ${{ secrets.CLIENT_3_TOKEN }}
          URL_3: ${{ secrets.CLIENT_3_URL }}
          TOKEN_4: ${{ secrets.CLIENT_4_TOKEN }}
          URL_4: ${{ secrets.CLIENT_4_URL }}
          TOKEN_5: ${{ secrets.CLIENT_5_TOKEN }}
          URL_5: ${{ secrets.CLIENT_5_URL }}
          TOKEN_6: ${{ secrets.CLIENT_6_TOKEN }}
          URL_6: ${{ secrets.CLIENT_6_URL }}
          TOKEN_7: ${{ secrets.CLIENT_7_TOKEN }}
          URL_7: ${{ secrets.CLIENT_7_URL }}
          TOKEN_8: ${{ secrets.CLIENT_8_TOKEN }}
          URL_8: ${{ secrets.CLIENT_8_URL }}
          TOKEN_9: ${{ secrets.CLIENT_9_TOKEN }}
          URL_9: ${{ secrets.CLIENT_9_URL }}
          TOKEN_10: ${{ secrets.CLIENT_10_TOKEN }}
          URL_10: ${{ secrets.CLIENT_10_URL }}
        run: |
          # 1. GLOBAL CONFIG
          git config --global user.email "vex-sync@system.com"
          git config --global user.name "VEX Sync Engine"
          git config --global http.postBuffer 524288000
          
          # HII NDIO DAWA YA 403: Inafuta headers za bot ya GitHub Actions
          git config --global --unset http.https://github.com/.extraheader || true

          for i in {1..10}
          do
            TOKEN_VAR="TOKEN_$i"
            URL_VAR="URL_$i"
            T_VAL="${!TOKEN_VAR}"
            U_VAL="${!URL_VAR}"

            if [ -z "$T_VAL" ] || [ -z "$U_VAL" ]; then
              continue
            fi

            echo "-----------------------------------------------"
            echo "🛠️ TARGET $i: ANALYZING CONNECTION..."

            # 2. USAFISHAJI WA URL (CLEANING ENGINE)
            # Inatoa https://, http://, na inahakikisha mwisho kuna .git
            CLEAN_URL=$(echo $U_VAL | sed -e 's|https://||g' -e 's|http://||g')
            [[ "$CLEAN_URL" != *.git ]] && CLEAN_URL="${CLEAN_URL}.git"
            
            # FINAL_URL yenye PAT Authentication
            AUTH_URL="https://x-access-token:${T_VAL}@${CLEAN_URL}"

            # 3. TRY-CATCH LOGIC (MARA 3)
            SUCCESS=false
            for attempt in {1..3}
            do
              echo "🚀 Attempt $attempt: Injecting Code to $CLEAN_URL..."
              
              # Tiba ya 403: -c http.extraheader=""
              if git -c http.extraheader="" push "$AUTH_URL" main --force --tags; then
                echo "✅ SUCCESS: Target $i is now EQUAL to Master."
                SUCCESS=true
                break
              else
                echo "⚠️ Attempt $attempt failed. Retrying in 2s..."
                sleep 2
              fi
            done

            if [ "$SUCCESS" = false ]; then
              echo "❌ CRITICAL: Target $i rejected all injection attempts."
            fi
          done
